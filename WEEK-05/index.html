<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 09 Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <h2>Group 09 Student Grade Calculator</h2>
        <p class="subtitle">Enter the student's score out of 100 to calculate their final grade.</p>
        
        <div class="input-group">
            <input type="number" id="scoreInput" placeholder="Enter score (0-100)" min="0" max="100">
            <button id="calcBtn">Calculate Grade</button>
        </div>

        <div id="results" class="results-box hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
