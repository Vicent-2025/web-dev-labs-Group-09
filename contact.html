<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP-09</title>
</head>
<body>
    <!--Basic Contact Form-->
    <h2>Basic Contact Form</h2>
    <form action="" method="post">
        <label for="">Name:</label>
        <input type="text"  placeholder="Enter your Name" required>
        <br><br>
        <label for="">Email:</label>
        <input type="email" placeholder="Enter your Email" required>
        <br><br>
        <textarea placeholder="Leave Your Message" required></textarea><br>
        <input type="submit" value="submit">
    </form>
    <br>
    <h2>Registration Form</h2>
    <form action="" method="post">
        <table border="1">
            <tr>
                <th>Full Name</th>
                <th>Email</th>
                <th>Password</th>
                <th>Gender</th>
                <th>Courses</th>
                <th>Submit</th>
            </tr>
            <tr>
                <td><input type="text" placeholder="Full Name" required></td>
                <td><input type="email" placeholder="Enter Email" required></td>
                <td><input type="password" placeholder="Enter Password" required></td>
                <td>
                    <input type="radio" name="gender" value="male">Male
                    <input type="radio" name="gender" value="female">Female
                </td>
                <td>
                    <input type="checkbox" name="a" value="CSS">CSS
                    <br>
                    <input type="checkbox" name="b" value="HTML">HTML
                    <br>
                    <input type="checkbox" name="c" value="JavaScript">JavaScript
                </td>
                <td><input type="submit" placeholder="submit"></td>
            </tr>
        </table>
    </form>
    <nav>
        <a href="timetable.html">Timetable Page</a><br>
        <a href="index.html">Home Page</a>
    </nav>
</body>
</html>
